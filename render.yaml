services:
  - type: web
    name: ooty-tourism-api
    runtime: node
    repo: https://github.com/YOUR_USERNAME/ooty-tourism
    plan: free
    buildCommand: cd client && npm install && npm run build
    startCommand: cd server && npm install && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://ooty-tourism.onrender.com
